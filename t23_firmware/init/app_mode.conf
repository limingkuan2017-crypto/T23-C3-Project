# -----------------------------------------------------------------------------
# app_mode.conf
#
# 角色:
#   控制当前镜像在启动后优先进入哪种应用模式。
#
# 用法:
#   1. 默认把 APP_MODE 设为 camera_diag，适合继续做相机 bring-up。
#   2. 如果想要“开机后直接进入浏览器串口调参模式”，把 APP_MODE 改成 isp_uartd。
#   3. 也可以在运行时通过 /tmp/app_mode.conf 临时覆盖这里的配置。
# -----------------------------------------------------------------------------

# 可选值:
#   camera_diag
#   isp_uartd
#   isp_bridge
APP_MODE=isp_bridge

# 仅在 APP_MODE=camera_diag 时有意义。
CAMERA_MODE=framesource

# ISP 串口网页调参模式使用调试串口。
ISP_UART_DEV=/dev/ttyS1
ISP_UART_BAUD=115200

# C3 bridge 模式使用接到 C3 的控制 UART。
# 根据当前硬件图，T23 pin70/pin71 属于 UART0，因此默认写成 ttyS0。
BRIDGE_UART_DEV=/dev/ttyS0
BRIDGE_UART_BAUD=115200

# 是否尝试挂载数据分区。
USE_DATA_PARTITION=0
