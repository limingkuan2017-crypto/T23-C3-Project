# T23 new hardware profile
#
# Purpose:
#   Enable UART0 on PB19/PB22 for T23 <-> ESP32-C3 control traffic,
#   while keeping UART1 on PB23/PB24 as the debug console.
#
# When to use:
#   Use this profile for the new hardware architecture where:
#   - PB19 / PB22 are wired to the ESP32-C3 control UART
#   - PB23 / PB24 remain the external debug/log UART
#
# This file is intentionally small and only describes the board-specific
# serial differences we currently care about. It is applied on top of the
# SDK kernel .config by scripts/apply_t23_kernel_serial_profile.sh.

PROFILE_NAME=t23_new_hw
PROFILE_DESC="New hardware: UART0 on PB19/PB22 for C3 control, UART1 on PB23/PB24 for debug"

CONFIG_SERIAL_T23_UART0=y
CONFIG_SERIAL_T23_UART0_DMA=n
CONFIG_UART0_PB=y
CONFIG_UART0_PB_FC=n

CONFIG_SERIAL_T23_UART1=y
CONFIG_SERIAL_T23_UART1_DMA=n
CONFIG_UART1_PA=n
CONFIG_UART1_PB=y
