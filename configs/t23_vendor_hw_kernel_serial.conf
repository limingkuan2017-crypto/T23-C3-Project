# T23 vendor/original hardware profile
#
# Purpose:
#   Restore the older serial layout inferred from the original working kernel:
#   - UART1 enabled on PB23/PB24 as the only active UART
#   - UART0 disabled
#
# When to use:
#   Use this profile when switching back to the supplier/original hardware
#   design and you want the kernel serial topology to match the old setup.
#
# Note:
#   This profile is reconstructed from the previously used .config, where:
#   - CONFIG_SERIAL_T23_UART0 was disabled
#   - CONFIG_SERIAL_T23_UART1 was enabled on PB23/PB24
#
# This file is intentionally small and only describes the board-specific
# serial differences we currently care about. It is applied on top of the
# SDK kernel .config by scripts/apply_t23_kernel_serial_profile.sh.

PROFILE_NAME=t23_vendor_hw
PROFILE_DESC="Vendor/original hardware: UART1 on PB23/PB24 only, UART0 disabled"

CONFIG_SERIAL_T23_UART0=n
CONFIG_SERIAL_T23_UART0_DMA=n
CONFIG_UART0_PB=n
CONFIG_UART0_PB_FC=n

CONFIG_SERIAL_T23_UART1=y
CONFIG_SERIAL_T23_UART1_DMA=n
CONFIG_UART1_PA=n
CONFIG_UART1_PB=y
